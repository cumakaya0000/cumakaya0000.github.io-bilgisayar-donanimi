<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgisayar Mimarisi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark {
            background-color: #09090b;
            color: #ffffff;
        }

        body.light {
            background-color: #f9fafb;
            color: #000000;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid;
            z-index: 50;
            transition: all 0.3s;
        }

        nav.dark {
            background-color: rgba(24, 24, 27, 0.7);
            border-bottom-color: rgba(39, 39, 42, 0.7);
        }

        nav.light {
            background-color: rgba(255, 255, 255, 0.7);
            border-bottom-color: rgba(229, 231, 235, 0.7);
        }

        .top-row {
            transition: all 0.3s;
            border-bottom: 1px solid;
        }

        .top-row.dark {
            border-bottom-color: rgba(39, 39, 42, 0.7);
        }

        .top-row.light {
            border-bottom-color: rgba(229, 231, 235, 0.7);
        }

        .top-row.scrolled {
            border-bottom: 0;
        }

        .container {
            max-width: 80rem;
            margin: 0 auto;
            padding: 1rem 1.5rem;
        }

        @media (max-width: 640px) {
            .container {
                padding: 0.75rem 1rem;
            }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .logo {
            font-weight: bold;
            font-size: 1.125rem;
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
            outline: none;
        }

        @media (max-width: 640px) {
            .logo {
                font-size: 1rem;
            }
        }

        .logo.dark {
            color: #34d399;
        }

        .logo.dark:hover {
            color: #6ee7b7;
        }

        .logo.light {
            color: #059669;
        }

        .logo.light:hover {
            color: #10b981;
        }

        .center-content {
            flex: 1;
            margin: 0 3rem;
            display: none;
        }

        @media (min-width: 768px) {
            .center-content {
                display: block;
            }
        }

        @media (min-width: 768px) and (max-width: 1024px) {
            .center-content {
                margin: 0 1.5rem;
            }
        }

        .quote {
            font-size: 0.875rem;
            font-style: italic;
            cursor: pointer;
            transition: all 0.3s;
            max-width: 28rem;
            margin: 0 auto;
            display: block;
            text-align: center;
            background: none;
            border: none;
            outline: none;
        }

        @media (max-width: 1024px) {
            .quote {
                font-size: 0.75rem;
                max-width: 20rem;
            }
        }

        .quote.dark {
            color: #34d399;
        }

        .quote.dark:hover {
            color: #6ee7b7;
        }

        .quote.light {
            color: #059669;
        }

        .quote.light:hover {
            color: #10b981;
        }

        .quote.hidden {
            opacity: 0;
            transform: translateY(-0.5rem);
            pointer-events: none;
            position: absolute;
        }

        .quote.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .menu-center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.875rem;
            transition: all 0.3s;
        }

        @media (max-width: 1024px) {
            .menu-center {
                gap: 1rem;
                font-size: 0.75rem;
            }
        }

        .menu-center.hidden {
            opacity: 0;
            transform: translateY(0.5rem);
            pointer-events: none;
            position: absolute;
        }

        .menu-center.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .menu-center button {
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
            font-weight: 500;
            font-size: 0.875rem;
            outline: none;
            white-space: nowrap;
        }

        @media (max-width: 1024px) {
            .menu-center button {
                font-size: 0.75rem;
            }
        }

        .menu-center button.dark {
            color: #d4d4d8;
        }

        .menu-center button.dark:hover {
            color: #34d399;
        }

        .menu-center button.light {
            color: #374151;
        }

        .menu-center button.light:hover {
            color: #059669;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        @media (max-width: 640px) {
            .controls {
                gap: 0.5rem;
            }
        }

        .lang-selector {
            position: relative;
        }

        .lang-button {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            outline: none;
        }

        @media (max-width: 640px) {
            .lang-button {
                padding: 0.4rem 0.6rem;
                gap: 0.3rem;
            }
        }

        .lang-button.dark {
            background-color: #27272a;
            color: #d4d4d8;
        }

        .lang-button.dark:hover {
            background-color: #3f3f46;
        }

        .lang-button.light {
            background-color: #f3f4f6;
            color: #374151;
        }

        .lang-button.light:hover {
            background-color: #e5e7eb;
        }

        .lang-menu {
            position: absolute;
            right: 0;
            margin-top: 0.5rem;
            width: 12rem;
            border-radius: 0.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
        }

        @media (max-width: 640px) {
            .lang-menu {
                width: 10rem;
            }
        }

        .lang-menu.show {
            display: block;
        }

        .lang-menu.dark {
            background-color: rgba(24, 24, 27, 0.7);
            border-color: rgba(39, 39, 42, 0.7);
        }

        .lang-menu.light {
            background-color: rgba(255, 255, 255, 0.7);
            border-color: rgba(229, 231, 235, 0.7);
        }

        .lang-option {
            width: 100%;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: background-color 0.2s;
            cursor: pointer;
            border: none;
            font-size: 0.875rem;
            outline: none;
        }

        @media (max-width: 640px) {
            .lang-option {
                padding: 0.6rem 0.8rem;
                font-size: 0.75rem;
            }
        }

        .lang-option.dark {
            color: #d4d4d8;
        }

        .lang-option.dark:hover {
            background-color: #27272a;
        }

        .lang-option.light {
            color: #374151;
        }

        .lang-option.light:hover {
            background-color: #f9fafb;
        }

        .lang-option.active.dark {
            background-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .lang-option.active.light {
            background-color: #ecfdf5;
            color: #059669;
        }

        .theme-button {
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        @media (max-width: 640px) {
            .theme-button {
                padding: 0.4rem;
            }
        }

        .theme-button.dark {
            background-color: #27272a;
            color: #d4d4d8;
        }

        .theme-button.dark:hover {
            background-color: #3f3f46;
        }

        .theme-button.light {
            background-color: #f3f4f6;
            color: #374151;
        }

        .theme-button.light:hover {
            background-color: #e5e7eb;
        }

        .bottom-row {
            overflow: hidden;
            transition: all 0.3s;
        }

        .bottom-row.dark {
            background-color: rgba(24, 24, 27, 0.3) !important;
        }

        .bottom-row.light {
            background-color: rgba(255, 255, 255, 0.3) !important;
        }

        .bottom-row.hidden {
            max-height: 0;
            opacity: 0;
        }

        .bottom-row.visible {
            max-height: 5rem;
            opacity: 1;
        }

        .bottom-menu {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            font-size: 0.875rem;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .bottom-menu {
                gap: 1rem;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 640px) {
            .bottom-menu {
                gap: 0.75rem;
                font-size: 0.7rem;
            }
        }

        .bottom-menu button {
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
            font-weight: 500;
            font-size: 0.875rem;
            outline: none;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .bottom-menu button {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 640px) {
            .bottom-menu button {
                font-size: 0.7rem;
            }
        }

        .bottom-menu button.dark {
            color: #d4d4d8;
        }

        .bottom-menu button.dark:hover {
            color: #34d399;
        }

        .bottom-menu button.light {
            color: #374151;
        }

        .bottom-menu button.light:hover {
            color: #059669;
        }

        .content {
            padding-top: 10rem;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
            padding-bottom: 5rem;
        }

        @media (max-width: 768px) {
            .content {
                padding-top: 12rem;
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }

        @media (max-width: 640px) {
            .content {
                padding-top: 14rem;
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }
        }

        .content-container {
            max-width: 80rem;
            margin: 0 auto;
        }

        .content-box {
            width: 100%;
            height: 400px;
            margin-bottom: 2rem;
            border-radius: 0.5rem;
            transition: background-color 0.3s;
        }

        @media (max-width: 768px) {
            .content-box {
                height: 300px;
                margin-bottom: 1.5rem;
            }
        }

        @media (max-width: 640px) {
            .content-box {
                height: 250px;
                margin-bottom: 1rem;
            }
        }

        .content-box.dark {
            background-color: #18181b;
        }

        .content-box.light {
            background-color: #ffffff;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        .icon {
            width: 1.25rem;
            height: 1.25rem;
        }

        @media (max-width: 640px) {
            .icon {
                width: 1rem;
                height: 1rem;
            }
        }

        .icon-sm {
            width: 1rem;
            height: 1rem;
        }

        @media (max-width: 640px) {
            .icon-sm {
                width: 0.875rem;
                height: 0.875rem;
            }
        }

        .mobile-menu-button {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            outline: none;
        }

        @media (max-width: 767px) {
            .mobile-menu-button {
                display: block;
            }
        }

        .mobile-menu-button.dark {
            color: #d4d4d8;
        }

        .mobile-menu-button.light {
            color: #374151;
        }
    </style>
</head>

    <script>
        let language = 'tr';
        let theme = 'dark';
        let activeQuote = 0;
        let showLangMenu = false;
        let isScrolled = false;
        const translations = {
    tr: {
        title: 'Bilgisayar Mimarisi',
        nav: { 
            discover: 'Keşfet',                  // 1
            history: 'Tarihçe',                  // 2
            system: 'Fiziksel Sistem Bileşenleri', // 3
            lab: 'Laboratuvar',                  // 4
            myths: 'Akademik Çalışmalar'         // 5
        },
        quotes: [
            { text: "Donanım umursamaz, yazılım unutmaz", author: "Alan Kay" },
            { text: "Basit şeyler karmaşıktır, karmaşık şeyler basittir", author: "Rob Pike" },
            { text: "Hız sorun değil, bekleme sorundur", author: "Grace Hopper" }
        ]
    },
    en: {
        title: 'Computer Architecture',
        nav: { 
            discover: 'Discover',
            history: 'History',
            system: 'Physical System Components',
            lab: 'Laboratory',
            myths: 'Academic Studies'
        },
        quotes: [
            { text: "Hardware doesn't care, software doesn't forget", author: "Alan Kay" },
            { text: "Simple things are complex, complex things are simple", author: "Rob Pike" },
            { text: "Speed is not the problem, waiting is", author: "Grace Hopper" }
        ]
    },
    de: {
        title: 'Computerarchitektur',
        nav: { 
            discover: 'Entdecken',
            history: 'Geschichte',
            system: 'Physische Systemkomponenten',
            lab: 'Labor',
            myths: 'Akademische Arbeiten'
        },
        quotes: [
            { text: "Hardware interessiert sich nicht, Software vergisst nicht", author: "Alan Kay" },
            { text: "Einfache Dinge sind komplex, komplexe Dinge sind einfach", author: "Rob Pike" },
            { text: "Geschwindigkeit ist nicht das Problem, Warten ist es", author: "Grace Hopper" }
        ]
    },
    es: {
        title: 'Arquitectura de Computadoras',
        nav: { 
            discover: 'Descubrir',
            history: 'Historia',
            system: 'Componentes Físicos del Sistema',
            lab: 'Laboratorio',
            myths: 'Estudios Académicos'
        },
        quotes: [
            { text: "Al hardware no le importa, el software no olvida", author: "Alan Kay" },
            { text: "Las cosas simples son complejas, las cosas complejas son simples", author: "Rob Pike" },
            { text: "La velocidad no es el problema, la espera sí", author: "Grace Hopper" }
        ]
    },
    ja: {
        title: 'コンピュータアーキテクチャ',
        nav: { 
            discover: '発見',
            history: '歴史',
            system: '物理システム構成要素',
            lab: '研究室',
            myths: '学術研究'
        },
        quotes: [
            { text: "ハードウェアは気にしない、ソフトウェアは忘れない", author: "Alan Kay" },
            { text: "単純なものは複雑で、複雑なものは単純だ", author: "Rob Pike" },
            { text: "速度は問題ではない、待つことが問題だ", author: "Grace Hopper" }
        ]
    },
    ko: {
        title: '컴퓨터 구조',
        nav: { 
            discover: '탐색',
            history: '역사',
            system: '물리적 시스템 구성 요소',
            lab: '실험실',
            myths: '학술 연구'
        },
        quotes: [
            { text: "하드웨어는 신경쓰지 않고, 소프트웨어는 잊지 않는다", author: "Alan Kay" },
            { text: "단순한 것은 복잡하고, 복잡한 것은 단순하다", author: "Rob Pike" },
            { text: "속도가 문제가 아니라, 기다림이 문제다", author: "Grace Hopper" }
        ]
    }
};

        const languages = [
            { code: 'tr', name: 'Türkçe', flag: '🇹🇷' },
            { code: 'en', name: 'English', flag: '🇬🇧' },
            { code: 'de', name: 'Deutsch', flag: '🇩🇪' },
            { code: 'es', name: 'Español', flag: '🇪🇸' },
            { code: 'ja', name: '日本語', flag: '🇯🇵' },
            { code: 'ko', name: '한국어', flag: '🇰🇷' }
        ];
        const body = document.body;
        const navbar = document.getElementById('navbar');
        const topRow = document.getElementById('topRow');
        const logo = document.getElementById('logo');
        const quote = document.getElementById('quote');
        const menuCenter = document.getElementById('menuCenter');
        const bottomRow = document.getElementById('bottomRow');
        const langButton = document.getElementById('langButton');
        const langMenu = document.getElementById('langMenu');
        const currentFlag = document.getElementById('currentFlag');
        const themeButton = document.getElementById('themeButton');
        const themeIcon = document.getElementById('themeIcon');
        function updateUI() {
            const currentLang = translations[language];
            const currentLangData = languages.find(lang => lang.code === language);
            logo.textContent = currentLang.title;
            quote.textContent = `"${currentLang.quotes[activeQuote].text}" — ${currentLang.quotes[activeQuote].author}`;
            document.getElementById('navDiscover').textContent = currentLang.nav.discover;
            document.getElementById('navLab').textContent = currentLang.nav.lab;
            document.getElementById('navSystem').textContent = currentLang.nav.system;
            document.getElementById('navMyths').textContent = currentLang.nav.myths;
            document.getElementById('navHistory').textContent = currentLang.nav.history;
            document.getElementById('bottomDiscover').textContent = currentLang.nav.discover;
            document.getElementById('bottomLab').textContent = currentLang.nav.lab;
            document.getElementById('bottomSystem').textContent = currentLang.nav.system;
            document.getElementById('bottomMyths').textContent = currentLang.nav.myths;
            document.getElementById('bottomHistory').textContent = currentLang.nav.history;
            currentFlag.textContent = currentLangData.flag;
            body.className = theme;
            navbar.className = theme;
            topRow.className = `top-row ${theme}${isScrolled ? ' scrolled' : ''}`;
            logo.className = `logo ${theme}`;
            quote.className = `quote ${theme} ${isScrolled ? 'hidden' : 'visible'}`;
            menuCenter.className = `menu-center ${isScrolled ? 'visible' : 'hidden'}`;
            bottomRow.className = `bottom-row ${isScrolled ? 'hidden' : 'visible'} ${theme}`;
            langButton.className = `lang-button ${theme}`;
            langMenu.className = `lang-menu ${theme}${showLangMenu ? ' show' : ''}`;
            themeButton.className = `theme-button ${theme}`;
            const menuButtons = document.querySelectorAll('.menu-center button');
            menuButtons.forEach(btn => btn.className = theme);
            const bottomButtons = document.querySelectorAll('.bottom-menu button');
            bottomButtons.forEach(btn => btn.className = theme);
            const contentBoxes = document.querySelectorAll('.content-box');
            contentBoxes.forEach(box => box.className = `content-box ${theme}`);
            if (theme === 'dark') {
                themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            } else {
                themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            }
        }
        function createLangMenu() {
            langMenu.innerHTML = '';
            languages.forEach(lang => {
                const button = document.createElement('button');
                button.className = `lang-option ${theme}${language === lang.code ? ' active' : ''}`;
                button.innerHTML = `<span class="text-xl">${lang.flag}</span><span>${lang.name}</span>`;
                button.addEventListener('click', () => {
                    language = lang.code;
                    activeQuote = 0;
                    showLangMenu = false;
                    updateUI();
                    createLangMenu();
                });
                langMenu.appendChild(button);
            });
        }
        themeButton.addEventListener('click', () => {
            theme = theme === 'dark' ? 'light' : 'dark';
            updateUI();
            createLangMenu();
        });
        langButton.addEventListener('click', () => {
            showLangMenu = !showLangMenu;
            updateUI();
        });
        document.addEventListener('click', (e) => {
            if (!langButton.contains(e.target) && !langMenu.contains(e.target)) {
                showLangMenu = false;
                updateUI();
            }
        });
        quote.addEventListener('click', () => {
            const currentLang = translations[language];
            activeQuote = (activeQuote + 1) % currentLang.quotes.length;
            updateUI();
        });
        setInterval(() => {
            const currentLang = translations[language];
            activeQuote = (activeQuote + 1) % currentLang.quotes.length;
            updateUI();
        }, 5000);
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                isScrolled = true;
            } else {
                isScrolled = false;
            }
            updateUI();
        });
        updateUI();
        createLangMenu();
    </script>
</body>
</html>
